<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="text-center mb-4">
                    <i class="bi bi-people-fill text-success fs-1"></i>
                    <h2 class="mt-2 fw-semibold">Create your account</h2>
                    <p class="text-muted mb-0">Join to access the dashboard</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center mb-4">Register</h4>
                        <form>
                            <div class="mb-3">
                                <label class="form-label" for="register-name">Full Name</label>
                                <input id="register-name" type="text" class="form-control" placeholder="Jane Doe" required>
                                <div class="form-text">Enter your first and last name.</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="register-email">Email address</label>
                                <input id="register-email" type="email" class="form-control" placeholder="name@example.com" required>
                                <div class="invalid-feedback">Please provide a valid email.</div>
                            </div>
                            <div class="row g-3">
                                <div class="col-12 col-sm-6">
                                    <label class="form-label" for="register-password">Password</label>
                                    <input id="register-password" type="password" class="form-control" placeholder="Minimum 8 characters" minlength="8" required>
                                    <div class="invalid-feedback">Password must be at least 8 characters.</div>
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label class="form-label" for="register-confirm">Confirm Password</label>
                                    <input id="register-confirm" type="password" class="form-control" placeholder="Re-enter password" minlength="8" required>
                                </div>
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <a class="btn btn-success" href="login.html">Create Account</a>
                                <a class="btn btn-outline-secondary" href="login.html">Back to Login</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
