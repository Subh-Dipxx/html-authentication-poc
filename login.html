<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
                    <h2 class="mt-2 fw-semibold">Welcome back</h2>
                    <p class="text-muted mb-0">Please sign in to continue</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center mb-4">Login</h4>
                        <form>
                            <div class="mb-3">
                                <label class="form-label" for="login-username">Username or Email</label>
                                <input id="login-username" type="text" class="form-control" placeholder="Enter your username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="login-password">Password</label>
                                <input id="login-password" type="password" class="form-control" placeholder="Enter your password" required>
                            </div>
                            <div class="d-grid mb-3">
                                <a class="btn btn-primary" href="dashboard.html">Login</a>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a class="link-primary" href="forgot-password.html">Forgot password?</a>
                                <a class="link-secondary" href="register.html">Create account</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
