<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-check text-primary fs-1"></i>
                    <h2 class="mt-2 fw-semibold">Reset your password</h2>
                    <p class="text-muted mb-0">Choose a strong password to secure your account</p>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label class="form-label" for="reset-new-password">New Password</label>
                                <div class="input-group">
                                    <input id="reset-new-password" type="password" class="form-control" placeholder="Enter new password" minlength="8" required>
                                    <button class="btn btn-outline-secondary password-toggle" type="button" aria-label="Toggle password visibility" data-target="reset-new-password">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text">Use at least 8 characters including a number.</div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label" for="reset-confirm-password">Confirm Password</label>
                                <div class="input-group">
                                    <input id="reset-confirm-password" type="password" class="form-control" placeholder="Re-enter new password" minlength="8" required>
                                    <button class="btn btn-outline-secondary password-toggle" type="button" aria-label="Toggle password visibility" data-target="reset-confirm-password">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="d-grid gap-2">
                                <a class="btn btn-primary" href="login.html">Update Password</a>
                                <a class="btn btn-outline-secondary" href="login.html">Back to Login</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        const toggleButtons = document.querySelectorAll('.password-toggle');
        toggleButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (!input) return;
                const isPassword = input.type === 'password';
                input.type = isPassword ? 'text' : 'password';
                const icon = button.querySelector('i');
                if (icon) {
                    icon.classList.toggle('bi-eye');
                    icon.classList.toggle('bi-eye-slash');
                }
            });
        });
    </script>
</body>
</html>
