<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-speedometer2 me-2"></i>
                Dashboard
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarMain">
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-light" href="login.html"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row g-4">
            <div class="col-12 col-lg-8">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h3 class="card-title mb-3">Welcome back!</h3>
                        <p class="text-muted">You are logged in successfully. Use the quick actions to navigate through the app.</p>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-primary" type="button"><i class="bi bi-layout-text-window-reverse me-1"></i>View Reports</button>
                            <button class="btn btn-outline-primary" type="button"><i class="bi bi-gear me-1"></i>Settings</button>
                            <button class="btn btn-outline-secondary" type="button"><i class="bi bi-people me-1"></i>Team</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:48px;height:48px;">
                                <i class="bi bi-person-check"></i>
                            </div>
                            <div class="ms-3">
                                <div class="fw-semibold">Account Status</div>
                                <div class="text-success">Active</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-semibold">Quick Links</div>
                    <div class="list-group list-group-flush">
                        <a class="list-group-item list-group-item-action" href="#"><i class="bi bi-patch-check me-2 text-success"></i>Security Center</a>
                        <a class="list-group-item list-group-item-action" href="#"><i class="bi bi-bell me-2 text-primary"></i>Notifications</a>
                        <a class="list-group-item list-group-item-action" href="#"><i class="bi bi-question-circle me-2 text-warning"></i>Help &amp; Support</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
